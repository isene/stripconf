<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1216"/>
      <stop offset="100%" style="stop-color:#05080a"/>
    </linearGradient>
    <linearGradient id="conf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#358a4f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#11111b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes slide  { 0% { transform: translateX(0); } 50% { transform: translateX(-6px); } 100% { transform: translateX(0); } }
    @keyframes flicker { 0%,49%,52%,100% { opacity: 1; } 50%,51% { opacity: 0.55; } }
    @keyframes blink   { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
    .seg-shift { animation: slide 4s ease-in-out infinite; transform-origin: 128px 100px; }
    .live      { animation: flicker 3s linear infinite; }
    .cursor    { animation: blink 1.1s steps(1) infinite; }
  </style>
  <!-- Disc -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#conf)" stroke-width="3"/>

  <!-- Top status bar (the strip itself) -->
  <g class="seg-shift">
    <rect x="40" y="76" width="176" height="22" rx="3" fill="url(#bar)" stroke="#2a2a3a" stroke-width="0.7"/>
    <!-- wintitle column (fixed-width, white) -->
    <rect x="44" y="80" width="48" height="14" rx="1" fill="#1a1f28"/>
    <text x="46"  y="90" font-family="monospace" font-size="9"  fill="#ffffff">~/projects</text>
    <!-- separator gap -->
    <!-- time + date -->
    <text x="100" y="90" font-family="monospace" font-size="9"  fill="#ffffff">12:42</text>
    <!-- cpu / mem dot -->
    <text x="128" y="90" font-family="monospace" font-size="9"  fill="#a6e3a1" class="live">cpu 18%</text>
    <!-- net dot -->
    <text x="160" y="90" font-family="monospace" font-size="9"  fill="#89dceb">net 24kb/s</text>
    <!-- bg block at right (battery) -->
    <rect x="200" y="82" width="12" height="10" rx="1" fill="#f9e2af"/>
  </g>

  <!-- Editor pane (config TUI itself) -->
  <g filter="url(#glow)">
    <rect x="40" y="108" width="176" height="86" rx="6" fill="#11111b" stroke="#313244" stroke-width="1"/>
    <!-- left pane (categories) -->
    <rect x="46" y="114" width="44" height="74" rx="2" fill="#1e1e2e"/>
    <!-- right pane (segments list) -->
    <rect x="94" y="114" width="116" height="74" rx="2" fill="#181825"/>
    <!-- left highlighted row -->
    <rect x="48" y="118" width="40" height="9" rx="1" fill="#a6e3a1" opacity="0.85"/>
    <text x="50" y="125" font-family="monospace" font-size="6" font-weight="bold" fill="#0e1216">Segments</text>
    <text x="50" y="138" font-family="monospace" font-size="6" fill="#cdd6f4">Bar globals</text>

    <!-- segment rows (right pane) -->
    <g font-family="monospace" font-size="6">
      <!-- row 1: dot, name, gap, color, interval, cmd -->
      <circle cx="100" cy="124" r="1.6" fill="#a6e3a1"/>
      <text x="106" y="126" fill="#ffffff">wintitle</text>
      <rect  x="138" y="121" width="6" height="6" rx="1" fill="#ffffff"/>
      <text x="148" y="126" fill="#7f849c">  1s</text>
      <text x="166" y="126" fill="#cdd6f4">wintitle --length 40</text>

      <circle cx="100" cy="135" r="1.6" fill="#a6e3a1"/>
      <text x="106" y="137" fill="#ffffff">time</text>
      <text x="138" y="137" fill="#7f849c">+16</text>
      <text x="148" y="137" fill="#7f849c">  1s</text>
      <text x="166" y="137" fill="#cdd6f4">clock</text>

      <circle cx="100" cy="146" r="1.6" fill="#a6e3a1"/>
      <text x="106" y="148" fill="#ffffff">cpu</text>
      <rect  x="138" y="143" width="6" height="6" rx="1" fill="#a6adc8"/>
      <text x="148" y="148" fill="#7f849c">  4s</text>
      <text x="166" y="148" fill="#cdd6f4">cpu</text>

      <!-- selected row -->
      <rect x="96" y="153" width="112" height="9" rx="1" fill="#313244"/>
      <circle cx="100" cy="158" r="1.6" fill="#a6e3a1"/>
      <text x="106" y="160" fill="#f9e2af">net</text>
      <text x="138" y="160" fill="#7f849c"> +6</text>
      <rect  x="138" y="155" width="6" height="6" rx="1" fill="#a6adc8" opacity="0"/>
      <text x="148" y="160" fill="#7f849c"> 30s</text>
      <text x="166" y="160" fill="#cdd6f4">conky_network…</text>
      <!-- right-pointer arrow on selected row -->
      <text x="202" y="160" fill="#a6e3a1">▶</text>

      <!-- disabled row (open dot) -->
      <circle cx="100" cy="170" r="1.6" fill="none" stroke="#585b70" stroke-width="0.7"/>
      <text x="106" y="172" fill="#585b70">mailG</text>
      <text x="138" y="172" fill="#585b70">    </text>
      <text x="148" y="172" fill="#585b70">  5s</text>
      <text x="166" y="172" fill="#585b70">mailbox G --dot</text>

      <!-- input prompt at bottom of right pane -->
      <text x="100" y="184" fill="#a6e3a1">Interval seconds:</text>
      <text x="158" y="184" fill="#cdd6f4">30</text>
      <text x="170" y="184" fill="#cdd6f4" class="cursor">█</text>
    </g>
  </g>

  <!-- Label -->
  <text x="128" y="218" font-family="monospace" font-size="20" font-weight="bold" fill="url(#conf)" text-anchor="middle" letter-spacing="1">stripconf</text>
  <text x="128" y="234" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">TUI config for strip</text>
</svg>
